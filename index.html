<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 替换原有viewport标签，手机端核心适配 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>我们的小窝 - 首页</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #333333;
            display: flex;
            min-height: 100vh;
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 100px;
            background-color: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: fixed;
            height: 100vh;
        }

        .sidebar .logo {
            width: 30px;
            height: 30px;
            background-color: #f5f5f5;
            border-radius: 4px;
            margin-bottom: 20px;
        }

        .sidebar .nav-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .sidebar .nav-item.active {
            background-color: #333333;
            color: #ffffff;
        }

        .sidebar .nav-item:hover:not(.active) {
            background-color: #f5f5f5;
        }

        /* 顶部栏（包含搜索框） */
        .top-bar {
            position: fixed;
            top: 0;
            left: 100px;
            right: 0;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
            width: 300px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .menu-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .menu-btn:hover {
            background-color: #f5f5f5;
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            margin-left: 100px;
            margin-top: 60px;
            padding: 40px;
            max-width: 900px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .page-subtitle {
            color: #999999;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .tags {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tag {
            display: inline-block;
            padding: 4px 12px;
            background-color: #f5f5f5;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .tag.active {
            background-color: #333333;
            color: #ffffff;
        }

        .tag:hover:not(.active) {
            background-color: #eaeaea;
        }

        /* 文章列表 */
        .post-list {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .post-item {
            display: flex;
            gap: 20px;
            padding-bottom: 30px;
            border-bottom: 1px solid #f0f0f0;
        }

        .post-cover {
            width: 240px;
            height: 160px;
            background-color: #f5f5f5;
            border-radius: 8px;
            overflow: hidden;
        }

        .post-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 10px;
        }

        .post-title {
            font-size: 20px;
            font-weight: 600;
            color: #333333;
        }

        .post-desc {
            color: #666666;
            font-size: 14px;
            line-height: 1.6;
        }

        .post-meta {
            color: #999999;
            font-size: 13px;
        }

        .post-more {
            align-self: flex-start;
            color: #999999;
            font-size: 14px;
            cursor: pointer;
        }

        .post-more:hover {
            color: #333333;
        }

        /* 右侧个人栏 */
        .aside {
            width: 300px;
            padding: 40px 20px;
            border-left: 1px solid #f0f0f0;
            margin-top: 60px;
        }

        .profile-card {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatars {
            display: flex;
            justify-content: center;
            gap: -15px;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #f5f5f5;
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-bio {
            color: #999999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            color: #999999;
            font-size: 13px;
            margin-top: 4px;
        }

        .social-card {
            margin-bottom: 30px;
        }

        .social-title {
            font-size: 14px;
            color: #666666;
            margin-bottom: 10px;
        }

        .social-item {
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .copyright {
            color: #999999;
            font-size: 12px;
            text-align: center;
        }

        /* 发布说说卡片（说说页面专用） */
        .publish-card {
            padding: 20px;
            background-color: #fafafa;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .publish-card textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid #f0f0f0;
            border-radius: 6px;
            resize: none;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .publish-btn {
            padding: 6px 16px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .publish-btn:hover {
            background-color: #555555;
        }
        /* ====== 新增：手机端响应式适配 (屏幕宽度≤768px) ====== */
@media (max-width: 768px) {
  /* 1. 侧边栏改为顶部折叠（手机端不占左侧空间） */
  .sidebar {
    width: 100%;
    height: 60px;
    flex-direction: row;
    justify-content: space-around;
    padding: 0 10px;
    top: 0;
    left: 0;
    z-index: 9999;
  }
  .sidebar .logo {
    display: none; /* 手机端隐藏logo，节省空间 */
  }
  .sidebar .nav-item {
    width: 60px;
    height: 60px;
    margin: 0;
  }
  .sidebar .nav-item i {
    font-size: 20px;
    margin-bottom: 4px;
  }
  .sidebar .nav-item span {
    font-size: 10px;
  }

  /* 2. 顶部搜索栏适配：下移到侧边栏下方，宽度100% */
  .top-bar {
    left: 0;
    top: 60px;
    padding: 0 10px;
    z-index: 9998;
  }
  .top-bar .search-box {
    max-width: 100%;
  }

  /* 3. 主内容区：去掉左右边距，适配手机宽度 */
  .main-content {
    margin-left: 0;
    margin-right: 0;
    margin-top: 120px; /* 避开侧边栏+搜索栏 */
    padding: 15px 10px;
  }
  .tag-filter .tag {
    padding: 4px 12px;
    font-size: 12px;
  }

  /* 4. 右侧个人栏：手机端移到页面底部，不再固定右侧，宽度100% */
  .aside {
    position: relative;
    width: 100%;
    height: auto;
    box-shadow: none;
    border-top: 1px solid #eee;
    padding: 20px 10px;
    margin-top: 20px;
  }
  .aside .avatar-box {
    margin-top: 0;
  }
  .aside .copyright {
    margin-top: 20px;
  }

  /* 5. 说说列表：适配手机，间距缩小 */
  .record-item {
    padding: 15px 0;
  }

  /* 6. 右上角菜单按钮：手机端上移，避免遮挡，点击区域变大 */
  #menuBtn {
    width: 44px;
    height: 44px;
    top: 8px;
    right: 8px;
    z-index: 10000;
  }
  /* 菜单下拉框：手机端宽度80%，居中显示 */
  #menuBox {
    width: 80%;
    right: 10%;
  }

  /* 7. 所有弹窗：手机端宽度90%，适配小屏幕 */
  #pwdModal > div, #reportModal > div, #memoModal > div {
    width: 90%;
    padding: 15px;
  }
  #memoModal > div {
    max-height: 70%;
  }
}
    </style>
</head>
<body>
    <!-- 左侧导航栏 -->
    <div class="sidebar">
        <div class="logo">❤️</div>
        <div class="nav-item active" data-page="home">🏠</div>
        <div class="nav-item" data-page="说说">💬</div>
        <div class="nav-item">📁</div>
        <div class="nav-item">#</div>
        <div class="nav-item">🔖</div>
        <div class="nav-item">📖</div>
        <div class="nav-item">📊</div>
    </div>

    <!-- 顶部搜索栏 -->
    <div class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="搜索说说内容或日期...">
        </div>
        <div class="menu-btn">☰</div>
    </div>

    <!-- 中间主内容区 -->
    <div class="main-content">
        <div id="homePage">
            <h1 class="page-title">首页</h1>
            <p class="page-subtitle">Home.</p>
            <div class="tags">
                <div class="tag active" data-filter="all">🗞 最新发布</div>
                <div class="tag" data-filter="say" onclick="window.location.href='say.html'">说说</div>
            </div>

            <!-- 文章列表（点滴记录） -->
            <div class="post-list" id="recordList">
                <div style="text-align: center; color: #999; padding: 40px 0;">还没有回忆，快来记录第一条吧～</div>
            </div>
        </div>
    </div>

    <!-- 右侧个人栏 -->
    <div class="aside">
        <div class="profile-card">
            <div class="profile-avatars">
                <div class="profile-avatar">
                    <img src="img\男生头像.jpg" alt="头像1">
                </div>
                <div class="profile-avatar">
                    <img src="img\女生头像.jpg" alt="头像2">
                </div>
            </div>
            <div class="profile-name">主页</div>
            <div class="profile-bio">欢迎收看我们的恋爱频道 ♡̷</div>
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number" id="recordCount">0</div>
                    <div class="stat-label">点滴</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="albumCount">0</div>
                    <div class="stat-label">照片</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="loveDays">0</div>
                    <div class="stat-label">相恋天</div>
                </div>
            </div>
        </div>

        <div class="social-card">
            <div class="social-title">主页 Homepage</div>
            <div class="social-item">🌹</div>
        </div>

        <div class="copyright">
            Copyright © 2024 - 2026 我们的小窝
        </div>
    </div>

   <script>
    // ========== 1. 核心配置 ==========
    const LOVE_START_DATE = new Date(2022, 4, 11); // 你们的恋爱日期

    // ========== 2. 主页显示说说（带附件/纯文字自适应） ==========
    const recordList = document.getElementById('recordList');
    const recordCount = document.getElementById('recordCount');
    const searchInput = document.getElementById('searchInput');

    // 获取说说数据
    function getRecords() {
        const says = localStorage.getItem('loveSays');
        return says ? JSON.parse(says) : [];
    }

    // 渲染说说（有附件显示附件，无附件纯文字）
    function renderRecords(filter = '') {
        const records = getRecords();
        recordCount.textContent = records.length;

        let filteredRecords = records;
        if (filter) {
            filteredRecords = records.filter(record =>
                record.content.includes(filter) || record.time.includes(filter)
            );
        }

        if (filteredRecords.length === 0) {
            recordList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px 0;">还没有说说，快来发布吧～</div>';
            return;
        }

        // 核心：判断是否有附件，有则显示，无则纯文字
        recordList.innerHTML = filteredRecords.reverse().map(record => {
            // 附件渲染逻辑
            let attachmentHtml = '';
            if (record.attachments && record.attachments.length > 0) {
                attachmentHtml = `
                    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin: 10px 0;">
                        ${record.attachments.map(att => {
                            if (att.type === 'image') {
                                // 显示上传的图片
                                return `<img src="${att.data}" alt="${att.name}" style="width: 120px; height: 120px; border-radius: 4px; object-fit: cover;">`;
                            } else if (att.type === 'video') {
                                // 显示视频（带播放控件）
                                return `<video src="${att.data}" controls style="width: 120px; height: 120px; border-radius: 4px; object-fit: cover;"></video>`;
                            } else {
                                // 显示文件名称
                                return `<div style="width: 120px; height: 120px; border-radius: 4px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; padding: 5px; word-break: break-all;">${att.name}</div>`;
                            }
                        }).join('')}
                    </div>
                `;
            }

            // 最终渲染模板（无随机图片，只显示用户上传的附件）
            return `
                <div style="padding: 25px 0; border-bottom: 1px solid #f0f0f0;">
                    <div style="font-size: 18px; font-weight: 500; margin-bottom: 10px;">我们的说说</div>
                    <div style="color: #333; font-size: 14px; line-height: 1.6; margin-bottom: 8px;">${record.content}</div>
                    ${attachmentHtml} <!-- 附件区域：有则显示，无则为空 -->
                    <div style="color: #999; font-size: 12px;">${record.time}</div>
                </div>
            `;
        }).join('');
    }

    // 搜索功能
    searchInput.addEventListener('input', function () {
        renderRecords(this.value.trim());
    });

    // ========== 3. 恋爱天数 ==========
    function updateLoveDays() {
        const now = new Date();
        const diff = now - LOVE_START_DATE;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('loveDays').textContent = days;
    }

    // ========== 4. 相册数量 ==========
    function updateAlbumCount() {
        const albums = localStorage.getItem('loveAlbums');
        const count = albums ? JSON.parse(albums).length : 0;
        document.getElementById('albumCount').textContent = count;
    }

    // ========== 5. 左侧菜单跳转 ==========
    document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', function () {
            const page = this.dataset.page;
            if (page === '说说') {
                window.location.href = '说说.html';
            }
        });
    });

    // ========== 初始化 ==========
    window.onload = function () {
        renderRecords();
        updateLoveDays();
        updateAlbumCount();
    };
</script>
</body>
</html>
