<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布说说 - 我们的小窝</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* PC端基础布局 */
        body {
            background-color: #ffffff;
            color: #333333;
            display: flex;
            min-height: 100vh;
            padding-bottom: 0;
        }

        /* 左侧导航栏（PC端） */
        .sidebar {
            width: 100px;
            background-color: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: fixed;
            height: 100vh;
            z-index: 99;
        }

        .sidebar .logo {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .sidebar .nav-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 20px;
        }

        .sidebar .nav-item.active {
            background-color: #f56f7c;
            color: #ffffff;
        }

        .sidebar .nav-item:hover:not(.active) {
            background-color: #fff0f2;
        }

        /* 顶部搜索栏（PC端） */
        .top-bar {
            position: fixed;
            top: 0;
            left: 100px;
            right: 0;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
            width: 300px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .menu-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .menu-btn:hover {
            background-color: #f5f5f5;
        }

        /* 主内容区（PC端） */
        .main-content {
            flex: 1;
            margin-left: 100px;
            margin-top: 60px;
            padding: 40px;
            max-width: 900px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* 发布说说卡片 */
        .publish-card {
            padding: 30px;
            background-color: #fafafa;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }

        .publish-textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: none;
            font-size: 16px;
            outline: none;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* 附件预览区 */
        #previewArea {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            max-height: 200px;
            overflow-y: auto;
            padding: 5px;
        }
        #previewArea > div {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f5f5f5;
        }
        #previewArea .video-preview {
            position: relative;
            width: 100%;
            height: 100%;
        }
        #previewArea .video-preview-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background-color: rgba(0,0,0,0.7);
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .publish-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .upload-btn:hover {
            background-color: #eaeaea;
        }

        #fileInput {
            display: none;
        }

        .publish-btn {
            padding: 10px 24px;
            background-color: #f56f7c;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .publish-btn:hover {
            background-color: #ff8595;
        }

        /* 已发布说说列表 */
        .say-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .say-item {
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .say-content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .say-attachments {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .say-attachment {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .say-attachment img, .say-attachment video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: auto;
        }

        .video-preview-cover {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
        }
        .video-play-icon {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            z-index: 1;
        }

        .say-attachment.file {
            font-size: 12px;
            color: #666;
            padding: 5px;
            word-break: break-all;
            text-align: center;
            cursor: default;
        }

        .say-meta {
            font-size: 12px;
            color: #999;
        }

        /* 右侧个人栏（仅PC端显示） */
        .aside {
            width: 300px;
            padding: 40px 20px;
            border-left: 1px solid #f0f0f0;
            margin-top: 60px;
        }

        .profile-card {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatars {
            display: flex;
            justify-content: center;
            gap: -15px;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #f5f5f5;
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-bio {
            color: #999999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            color: #999999;
            font-size: 13px;
            margin-top: 4px;
        }

        .social-card {
            margin-bottom: 30px;
        }

        .social-title {
            font-size: 14px;
            color: #666666;
            margin-bottom: 10px;
        }

        .social-item {
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .copyright {
            color: #999999;
            font-size: 12px;
            text-align: center;
        }

        /* 移动端响应式 */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding-bottom: 80px;
            }
            .aside {
                display: none !important;
            }
            .top-bar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 10px 20px;
                height: auto;
                z-index: 90;
            }
            .search-box {
                width: 100%;
                max-width: none;
            }
            .menu-btn {
                display: none;
            }
            .main-content {
                margin-left: 0;
                margin-top: 60px;
                padding: 20px;
                max-width: 100%;
            }
            .page-title {
                font-size: 24px;
                margin-bottom: 20px;
            }
            .publish-card {
                padding: 20px;
            }
            .publish-textarea {
                height: 120px;
                font-size: 14px;
            }
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px 0;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                position: fixed;
                bottom: 0;
                left: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid #f0f0f0;
                gap: 0;
                background-color: #ffffff;
                z-index: 99;
            }
            .sidebar .logo {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧/底部导航栏（统一6个图标） -->
    <div class="sidebar">
        <div class="logo">❤️</div>
        <div class="nav-item" data-page="home">🏠</div>             <!-- 首页 -->
        <div class="nav-item active" data-page="say">💬</div>       <!-- 说说 -->
        <div class="nav-item" data-page="record">📖</div>           <!-- 小事 -->
        <div class="nav-item" data-page="album">🖼️</div>            <!-- 相册 -->
        <div class="nav-item" data-page="fund">💰</div>             <!-- 基金 -->
    </div>

    <!-- 顶部搜索栏 -->
    <div class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchSay" placeholder="搜索说说内容...">
        </div>
        <div class="menu-btn">☰</div>
    </div>

    <!-- 主内容区：说说发布+列表 -->
    <div class="main-content">
        <h1 class="page-title">发布说说</h1>
        
        <!-- 发布说说卡片 -->
        <div class="publish-card">
            <textarea class="publish-textarea" id="sayContent" placeholder="分享你们的甜蜜瞬间..."></textarea>
            <div id="previewArea"></div>
            <div class="publish-tools">
                <label class="upload-btn">
                    📎 上传附件
                    <input type="file" id="fileInput" multiple accept="image/*,video/*,.txt,.doc,.pdf">
                </label>
            </div>
            <button class="publish-btn" id="publishBtn">发布</button>
        </div>

        <!-- 已发布说说列表 -->
        <div class="say-list" id="sayList">
            <div style="text-align: center; color: #999; padding: 40px 0;">还没有说说，快来发布第一条吧～</div>
        </div>
    </div>

    <!-- 右侧个人栏（仅PC端显示） -->
    <div class="aside">
        <div class="profile-card">
            <div class="profile-avatars">
                <div class="profile-avatar">
                    <img src="img/男生头像.jpg" alt="男生头像">
                </div>
                <div class="profile-avatar">
                    <img src="img/女生头像.jpg" alt="女生头像">
                </div>
            </div>
            <div class="profile-name">主页</div>
            <div class="profile-bio">欢迎收看我们的恋爱频道 ♡̷</div>
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number" id="recordCount">0</div>
                    <div class="stat-label">点滴</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="albumCount">0</div>
                    <div class="stat-label">照片</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="loveDays">0</div>
                    <div class="stat-label">相恋天</div>
                </div>
            </div>
        </div>
        <div class="social-card">
            <div class="social-title">主页 Homepage</div>
            <div class="social-item">🌹</div>
        </div>
        <div class="copyright">
            Copyright © 2024 - 2026 我们的小窝
        </div>
    </div>

    <script>
        // 恋爱开始日期
        const LOVE_START_DATE = new Date(2022, 4, 11);

        // 全局变量：附件列表
        let attachments = [];

        // 文件上传预览
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');

        fileInput.addEventListener('change', function(e) {
            previewArea.innerHTML = '';
            attachments = [];
            const files = e.target.files;
            if (!files.length) return;

            Array.from(files).forEach(file => {
                const div = document.createElement('div');
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    let type = 'file';
                    if (file.type.startsWith('image/')) {
                        type = 'image';
                        div.innerHTML = `<img src="${event.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
                    } else if (file.type.startsWith('video/')) {
                        type = 'video';
                        div.className = 'video-preview';
                        div.innerHTML = `
                            <video src="${event.target.result}" style="width:100%; height:100%; object-fit:cover; opacity:0.8;"></video>
                            <div class="video-preview-icon">▶</div>
                        `;
                    } else {
                        div.innerHTML = `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:12px; color:#666;">📄</div>`;
                    }

                    attachments.push({
                        name: file.name,
                        type: type,
                        data: event.target.result
                    });

                    previewArea.appendChild(div);
                };

                reader.readAsDataURL(file);
            });
        });

        // 获取本地存储的说说
        function getSays() {
            const says = localStorage.getItem('loveSays');
            return says ? JSON.parse(says) : [];
        }

        // 渲染说说列表
        function renderSays(filter = '') {
            const says = getSays();
            document.getElementById('recordCount').textContent = says.length;

            let filteredSays = says;
            if (filter) {
                filteredSays = says.filter(say => say.content.includes(filter) || say.time.includes(filter));
            }

            const sayList = document.getElementById('sayList');
            if (filteredSays.length === 0) {
                sayList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px 0;">还没有说说，快来发布第一条吧～</div>';
                return;
            }

            sayList.innerHTML = filteredSays.reverse().map(say => {
                let attachmentHtml = '';
                if (say.attachments && say.attachments.length > 0) {
                    attachmentHtml = `
                        <div class="say-attachments">
                            ${say.attachments.map(att => {
                                if (att.type === 'image') {
                                    return `<div class="say-attachment"><img src="${att.data}" alt="${att.name}"></div>`;
                                } else if (att.type === 'video') {
                                    return `
                                        <div class="say-attachment">
                                            <div class="video-preview-cover" onclick="playVideo(this)">
                                                <div class="video-play-icon">▶</div>
                                                <video src="${att.data}" style="width:100%; height:100%; object-fit:cover;" controls></video>
                                            </div>
                                        </div>
                                    `;
                                } else {
                                    return `<div class="say-attachment file"><a href="${att.data}" target="_blank">📄 ${att.name}</a></div>`;
                                }
                            }).join('')}
                        </div>
                    `;
                }

                return `
                    <div class="say-item">
                        <div class="say-content">${say.content}</div>
                        ${attachmentHtml}
                        <div class="say-meta">${say.time}</div>
                    </div>
                `;
            }).join('');
        }

        window.playVideo = function(container) {
            const video = container.querySelector('video');
            const playIcon = container.querySelector('.video-play-icon');
            if (video.paused) {
                video.play();
                playIcon.style.display = 'none';
            } else {
                video.pause();
                playIcon.style.display = 'flex';
            }
        };

        const publishBtn = document.getElementById('publishBtn');
        const sayContent = document.getElementById('sayContent');
        
        publishBtn.addEventListener('click', function() {
            const content = sayContent.value.trim();
            if (!content) {
                alert('说说内容不能为空～');
                return;
            }

            const now = new Date();
            const time = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

            const newSay = {
                content: content,
                attachments: attachments,
                time: time
            };

            const says = getSays();
            says.push(newSay);
            localStorage.setItem('loveSays', JSON.stringify(says));

            sayContent.value = '';
            attachments = [];
            previewArea.innerHTML = '';
            fileInput.value = '';

            renderSays();
            alert('发布成功～');
        });

        const searchSay = document.getElementById('searchSay');
        searchSay.addEventListener('input', function() {
            renderSays(this.value.trim());
        });

        function updateLoveDays() {
            const now = new Date();
            const diff = now - LOVE_START_DATE;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('loveDays').textContent = days;
        }

        function updateAlbumCount() {
            const albums = localStorage.getItem('loveAlbums');
            const count = albums ? JSON.parse(albums).length : 0;
            document.getElementById('albumCount').textContent = count;
        }

        // 导航跳转逻辑（统一6个图标）
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function () {
                const page = this.dataset.page;
                if (page === 'home') window.location.href = 'index.html';
                else if (page === 'say') window.location.href = 'say.html';
                else if (page === 'record') window.location.href = 'record.html';
                else if (page === 'album') window.location.href = 'album.html';
                else if (page === 'fund') {
                    const role = localStorage.getItem('role');
                    if (role !== 'admin') {
                        alert('只有管理员可以查看基金页面');
                        return;
                    }
                    window.location.href = 'fund.html';
                }
            });
        });

        // 页面初始化
        window.onload = function () {
            renderSays();
            updateLoveDays();
            updateAlbumCount();
        };
    </script>
</body>
</html>
