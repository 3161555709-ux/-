<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布说说 - 我们的小窝</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* PC端基础布局 */
        body {
            background-color: #ffffff;
            color: #333333;
            display: flex;
            min-height: 100vh;
            padding-bottom: 0;
        }

        /* 左侧导航栏（PC端样式） */
        .sidebar {
            width: 100px;
            background-color: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: fixed;
            height: 100vh;
            z-index: 99;
        }

        .sidebar .logo {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .sidebar .nav-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 20px;
        }

        .sidebar .nav-item.active {
            background-color: #f56f7c;
            color: #ffffff;
        }

        .sidebar .nav-item:hover:not(.active) {
            background-color: #fff0f2;
        }

        /* 顶部搜索栏（PC端） */
        .top-bar {
            position: fixed;
            top: 0;
            left: 100px;
            right: 0;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
            width: 300px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .menu-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 18px;
        }

        .menu-btn:hover {
            background-color: #f5f5f5;
        }

        /* 主内容区（PC端） */
        .main-content {
            flex: 1;
            margin-left: 100px;
            margin-top: 60px;
            padding: 40px;
            max-width: 900px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* 发布说说卡片 */
        .publish-card {
            padding: 30px;
            background-color: #fafafa;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }

        .publish-textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: none;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .publish-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .upload-btn:hover {
            background-color: #eaeaea;
        }

        #fileInput {
            display: none;
        }

        .publish-btn {
            padding: 10px 24px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .publish-btn:hover {
            background-color: #555555;
        }

        /* 已发布说说列表 */
        .say-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .say-item {
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .say-content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
            white-space: pre-wrap; /* 保留换行 */
        }

        .say-attachments {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .say-attachment {
            width: 120px;
            height: 120px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .say-attachment img, .say-attachment video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .say-meta {
            font-size: 12px;
            color: #999;
        }

        /* 右侧个人栏（仅PC端显示） */
        .aside {
            width: 300px;
            padding: 40px 20px;
            border-left: 1px solid #f0f0f0;
            margin-top: 60px;
        }

        .profile-card {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatars {
            display: flex;
            justify-content: center;
            gap: -15px;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #f5f5f5;
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-bio {
            color: #999999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            color: #999999;
            font-size: 13px;
            margin-top: 4px;
        }

        .social-card {
            margin-bottom: 30px;
        }

        .social-title {
            font-size: 14px;
            color: #666666;
            margin-bottom: 10px;
        }

        .social-item {
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .copyright {
            color: #999999;
            font-size: 12px;
            text-align: center;
        }

        /* ========== 移动端响应式 ========== */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
                padding-bottom: 80px; /* 给底部导航留空间 */
            }

            .aside {
                display: none !important;
            }

            /* 顶部搜索栏适配 */
            .top-bar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 10px 20px;
                height: auto;
                z-index: 90;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .search-box {
                width: 75%;
                max-width: none;
            }

            .menu-btn {
                display: flex !important;
                font-size: 24px;
                width: 40px;
                justify-content: center;
                margin-left: 0;
            }

            .main-content {
                margin-left: 0;
                margin-top: 60px;
                padding: 20px;
                max-width: 100%;
            }

            .page-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .publish-card {
                padding: 20px;
            }

            .publish-textarea {
                height: 120px;
                font-size: 14px;
            }

            /* 底部导航 */
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px 0;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                position: fixed;
                bottom: 0;
                left: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid #f0f0f0;
                gap: 0;
                background-color: #ffffff;
                z-index: 99;
            }

            .sidebar .logo {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <div class="sidebar">
        <div class="logo">❤️</div>
        <div class="nav-item" data-page="home">🏠</div>
        <div class="nav-item active" data-page="say">💬</div>
        <div class="nav-item" data-page="record">📖</div>
        <div class="nav-item" data-page="album">🖼️</div>
        <div class="nav-item">📊</div>
    </div>

    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchSay" placeholder="搜索说说内容...">
        </div>
        <div class="menu-btn" id="publishToggleBtn">➕</div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <h1 class="page-title">说说列表</h1>
        
        <!-- 发布卡片 -->
        <div class="publish-card" id="publishCard" style="display: none;">
            <textarea class="publish-textarea" id="sayContent" placeholder="分享你们的甜蜜瞬间..."></textarea>
            <div class="publish-tools">
                <label class="upload-btn">
                    📎 上传照片/视频
                    <input type="file" id="fileInput" multiple accept="image/*,video/*">
                </label>
            </div>
            <button class="publish-btn" id="publishBtn">发布</button>
        </div>

        <!-- 列表容器 -->
        <div class="say-list" id="sayList">
            <div style="text-align: center; color: #999; padding: 40px 0;">加载中...</div>
        </div>
    </div>

    <!-- 右侧个人栏 -->
    <div class="aside">
        <div class="profile-card">
            <div class="profile-avatars">
                <div class="profile-avatar">
                    <img src="男生头像.jpg" alt="男生头像">
                </div>
                <div class="profile-avatar">
                    <img src="女生头像.jpg" alt="女生头像">
                </div>
            </div>
            <div class="profile-name">主页</div>
            <div class="profile-bio">欢迎收看我们的恋爱频道 ♡̷</div>
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number" id="recordCount">0</div>
                    <div class="stat-label">点滴</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="albumCount">0</div>
                    <div class="stat-label">照片</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="loveDays">0</div>
                    <div class="stat-label">相恋天</div>
                </div>
            </div>
        </div>
        <div class="social-card">
            <div class="social-title">主页 Homepage</div>
            <div class="social-item">🌹</div>
        </div>
        <div class="copyright">
            Copyright © 2024 - 2026 我们的小窝
        </div>
    </div>

    <!-- 脚本引用 -->
    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    <script src="cos-utils.js"></script>
    <script>
        const LOVE_START_DATE = new Date(2022, 4, 11);

        // 获取说说数据
        async function getSays() {
            return await API.getData('says.json', []);
        }

        // 渲染列表
        async function renderSays(filter = '') {
            const says = await getSays();
            // 更新统计
            const recordCountEl = document.getElementById('recordCount');
            if (recordCountEl) recordCountEl.textContent = says.length;

            let filteredSays = says;
            if (filter) {
                filteredSays = says.filter(say => say.content.includes(filter) || say.time.includes(filter));
            }

            const sayList = document.getElementById('sayList');
            if (filteredSays.length === 0) {
                sayList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px 0;">还没有说说内容~</div>';
                return;
            }

            sayList.innerHTML = filteredSays.reverse().map(say => {
                let attachmentHtml = '';
                if (say.attachments && say.attachments.length > 0) {
                    attachmentHtml = `
                        <div class="say-attachments">
                            ${say.attachments.map(att => {
                                if (att.type === 'image') {
                                    return `<div class="say-attachment"><img src="${att.data}" onclick="window.open('${att.data}')"></div>`;
                                } else if (att.type === 'video') {
                                    return `<div class="say-attachment"><video src="${att.data}" controls></video></div>`;
                                } else {
                                    return `<div class="say-attachment file"><a href="${att.data}" target="_blank">📄 ${att.name}</a></div>`;
                                }
                            }).join('')}
                        </div>
                    `;
                }

                // 只有管理员显示删除按钮
                const deleteBtn = localStorage.getItem('role') === 'admin' 
                    ? `<button class="delete-btn" style="color:red; border:none; background:none; cursor:pointer;" onclick="deleteSay('${say.time}')">🗑️</button>` 
                    : '';

                return `
                    <div class="say-item">
                        <div class="say-header" style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <div class="say-meta">${say.time}</div>
                            ${deleteBtn}
                        </div>
                        <div class="say-content">${say.content}</div>
                        ${attachmentHtml}
                    </div>
                `;
            }).join('');
        }

        // 删除功能
        window.deleteSay = async function(time) {
            if (!confirm('确定要删除这条说说吗？')) return;
            const says = await getSays();
            const newSays = says.filter(s => s.time !== time);
            await API.saveData('says.json', newSays);
            renderSays();
        };

        // 发布逻辑
        const publishBtn = document.getElementById('publishBtn');
        publishBtn.addEventListener('click', async () => {
            const content = document.getElementById('sayContent').value.trim();
            const fileInput = document.getElementById('fileInput');
            
            if (!content && (!fileInput.files || fileInput.files.length === 0)) {
                alert('写点什么或者发张图片吧～');
                return;
            }

            publishBtn.disabled = true;
            publishBtn.textContent = '发布中...';

            const newAttachments = [];
            if (fileInput.files && fileInput.files.length > 0) {
                for (let i = 0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    try {
                        const url = await API.uploadFile(file, 'attachments/');
                        let type = 'file';
                        if (file.type.startsWith('image/')) type = 'image';
                        else if (file.type.startsWith('video/')) type = 'video';
                        
                        newAttachments.push({
                            name: file.name,
                            type: type,
                            data: url
                        });
                    } catch (err) {
                        console.error('上传失败', err);
                    }
                }
            }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

            const newSay = {
                content: content,
                time: timeStr,
                attachments: newAttachments
            };

            const says = await getSays();
            says.push(newSay);
            await API.saveData('says.json', says);

            // 重置界面
            document.getElementById('sayContent').value = '';
            fileInput.value = '';
            publishBtn.disabled = false;
            publishBtn.textContent = '发布';
            document.getElementById('publishCard').style.display = 'none';
            
            renderSays();
        });

        // 搜索
        document.getElementById('searchSay').addEventListener('input', function() {
            renderSays(this.value.trim());
        });

        // 导航跳转
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function () {
                const page = this.dataset.page;
                if (page === 'home') window.location.href = 'index.html';
                else if (page === 'say') window.location.href = 'say.html';
                else if (page === 'record') window.location.href = 'record.html';
                else if (page === 'album') window.location.href = 'album.html';
            });
        });

        // 发布框显示切换
        document.getElementById('publishToggleBtn').addEventListener('click', () => {
            const role = localStorage.getItem('role');
            if (role !== 'admin') {
                alert('只有管理员可以发布说说哦~ 请先在主页登录');
                return;
            }
            const card = document.getElementById('publishCard');
            card.style.display = card.style.display === 'none' ? 'block' : 'none';
        });

        // 辅助统计
        function updateLoveDays() {
            const now = new Date();
            const diff = now - LOVE_START_DATE;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const el = document.getElementById('loveDays');
            if (el) el.textContent = days;
        }

        async function updateAlbumCount() {
            const albums = await API.getData('albums.json', []);
            const el = document.getElementById('albumCount');
            if (el) el.textContent = albums.length;
        }

        // 初始化
        window.onload = function () {
            if (!localStorage.getItem('isLoggedIn') && !sessionStorage.getItem('isLoggedIn')) {
                window.location.replace('login.html');
                return;
            }
            renderSays();
            updateLoveDays();
            updateAlbumCount();
        };
    </script>
</body>

</html>
