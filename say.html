<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布说说 - 我们的小窝</title>
    <style>
        /* 全局重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        /* PC端基础布局 */
        body {
            background-color: #ffffff;
            color: #333333;
            display: flex;
            min-height: 100vh;
            padding-bottom: 0;
        }

        /* 左侧导航栏（PC端样式） */
        .sidebar {
            width: 100px;
            background-color: #ffffff;
            border-right: 1px solid #f0f0f0;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            position: fixed;
            height: 100vh;
            z-index: 99;
        }

        .sidebar .logo {
            width: 30px;
            height: 30px;
            /* background-color: #f5f5f5; */
            border-radius: 4px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .sidebar .nav-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 20px;
        }

        .sidebar .nav-item.active {
            background-color: #f56f7c; /* 用户要求的适合颜色 */
            color: #ffffff;
        }

        .sidebar .nav-item:hover:not(.active) {
            background-color: #fff0f2;
        }

        /* 顶部搜索栏（PC端） */
        .top-bar {
            position: fixed;
            top: 0;
            left: 100px;
            right: 0;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            padding: 0 40px;
            z-index: 10;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background-color: #f5f5f5;
            border-radius: 6px;
            width: 300px;
        }

        .search-box input {
            border: none;
            background: transparent;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .menu-btn {
            margin-left: auto;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }

        .menu-btn:hover {
            background-color: #f5f5f5;
        }

        /* 主内容区（PC端） */
        .main-content {
            flex: 1;
            margin-left: 100px;
            margin-top: 60px;
            padding: 40px;
            max-width: 900px;
        }

        .page-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 30px;
        }

        /* 发布说说卡片 */
        .publish-card {
            padding: 30px;
            background-color: #fafafa;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #f0f0f0;
        }

        .publish-textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            resize: none;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .publish-tools {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background-color: #f5f5f5;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #666;
        }

        .upload-btn:hover {
            background-color: #eaeaea;
        }

        #fileInput {
            display: none;
        }

        .publish-btn {
            padding: 10px 24px;
            background-color: #333333;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        .publish-btn:hover {
            background-color: #555555;
        }

        /* 已发布说说列表 */
        .say-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .say-item {
            padding: 20px;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #f0f0f0;
        }

        .say-content {
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .say-attachments {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .say-attachment {
            width: 100px;
            height: 100px;
            border-radius: 4px;
            overflow: hidden;
            background-color: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .say-attachment img, .say-attachment video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .say-attachment.file {
            font-size: 12px;
            color: #666;
            padding: 5px;
            word-break: break-all;
            text-align: center;
        }

        .say-meta {
            font-size: 12px;
            color: #999;
        }

        /* 右侧个人栏（仅PC端显示） */
        .aside {
            width: 300px;
            padding: 40px 20px;
            border-left: 1px solid #f0f0f0;
            margin-top: 60px;
        }

        .profile-card {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-avatars {
            display: flex;
            justify-content: center;
            gap: -15px;
            margin-bottom: 15px;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #f5f5f5;
            overflow: hidden;
            border: 3px solid #ffffff;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .profile-bio {
            color: #999999;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .profile-stats {
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 18px;
            font-weight: 600;
        }

        .stat-label {
            color: #999999;
            font-size: 13px;
            margin-top: 4px;
        }

        .social-card {
            margin-bottom: 30px;
        }

        .social-title {
            font-size: 14px;
            color: #666666;
            margin-bottom: 10px;
        }

        .social-item {
            padding: 10px;
            background-color: #f5f5f5;
            border-radius: 6px;
            font-size: 14px;
        }

        .copyright {
            color: #999999;
            font-size: 12px;
            text-align: center;
        }

        /* ========== 移动端响应式（核心：隐藏个人栏，底部导航和主页一致） ========== */
        @media (max-width: 768px) {
            /* 整体布局改为垂直列 */
            body {
                flex-direction: column;
                padding-bottom: 80px; /* 给底部导航留空间 */
            }

            /* 隐藏个人栏 */
            .aside {
                display: none !important;
            }

            /* 顶部搜索栏：置顶，宽度100% */
            .top-bar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                padding: 10px 20px;
                height: auto;
                z-index: 90;
            }

            .search-box {
                width: 80%; /* 留出空间给发布按钮 */
                max-width: none;
            }

            .menu-btn {
                display: flex !important; /* 强制显示发布按钮 */
                font-size: 24px;
                width: 40px;
                justify-content: center;
            }

            /* 主内容区：置顶展示，无侧边距 */
            .main-content {
                margin-left: 0;
                margin-top: 60px; /* 避开顶部搜索栏 */
                padding: 20px;
                max-width: 100%;
            }

            .page-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .publish-card {
                padding: 20px;
            }

            .publish-textarea {
                height: 120px;
                font-size: 14px;
            }

            /* 左侧导航改为底部导航（和主页完全一致） */
            .sidebar {
                width: 100%;
                height: auto;
                padding: 15px 0;
                flex-direction: row;
                justify-content: space-around;
                align-items: center;
                position: fixed;
                bottom: 0;
                left: 0;
                top: auto;
                border-right: none;
                border-top: 1px solid #f0f0f0;
                gap: 0;
                background-color: #ffffff;
                z-index: 99;
            }

            .sidebar .logo {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- 左侧/底部导航栏 -->
    <div class="sidebar">
        <div class="logo">❤️</div>
        <div class="nav-item" onclick="window.location.href='index.html'">🏠</div>
        <div class="nav-item active" data-page="say">💬</div>
        <div class="nav-item" data-page="record">📖</div>
        <div class="nav-item" data-page="album">🖼️</div>
        <div class="nav-item">📊</div>
    </div>

    <!-- 顶部搜索栏（和主页一致） -->
    <div class="top-bar">
        <div class="search-box">
            <span>🔍</span>
            <input type="text" id="searchSay" placeholder="搜索说说内容...">
        </div>
        <div class="menu-btn" id="publishToggleBtn">➕</div>
    </div>

    <!-- 主内容区：说说发布+列表 -->
    <div class="main-content">
        <h1 class="page-title">说说列表</h1>
        
        <!-- 发布说说卡片 (默认隐藏，管理员点击➕显示) -->
        <div class="publish-card" id="publishCard" style="display: none;">
            <textarea class="publish-textarea" id="sayContent" placeholder="分享你们的甜蜜瞬间..."></textarea>
            <div class="publish-tools">
                <label class="upload-btn">
                    📎 上传照片
                    <input type="file" id="fileInput" multiple accept="image/*">
                </label>
            </div>
            <button class="publish-btn" id="publishBtn">发布</button>
        </div>

        <!-- 已发布说说列表 -->
        <div class="say-list" id="sayList">
            <div style="text-align: center; color: #999; padding: 40px 0;">还没有说说，快来发布第一条吧～</div>
        </div>
    </div>

    <!-- 右侧个人栏（仅PC端显示） -->
    <div class="aside">
        <div class="profile-card">
            <div class="profile-avatars">
                <div class="profile-avatar">
                    <img src="男生头像.jpg" alt="男生头像">
                </div>
                <div class="profile-avatar">
                    <img src="女生头像.jpg" alt="女生头像">
                </div>
            </div>
            <div class="profile-name">主页</div>
            <div class="profile-bio">欢迎收看我们的恋爱频道 ♡̷</div>
            <div class="profile-stats">
                <div class="stat-item">
                    <div class="stat-number" id="recordCount">0</div>
                    <div class="stat-label">点滴</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="albumCount">0</div>
                    <div class="stat-label">照片</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="loveDays">0</div>
                    <div class="stat-label">相恋天</div>
                </div>
            </div>
        </div>
        <div class="social-card">
            <div class="social-title">主页 Homepage</div>
            <div class="social-item">🌹</div>
        </div>
        <div class="copyright">
            Copyright © 2024 - 2026 我们的小窝
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>
    <script src="cos-utils.js"></script>
    <script>
        // 恋爱开始日期（和主页保持一致）
        const LOVE_START_DATE = new Date(2022, 4, 11);

        // 全局变量：附件列表
        let attachments = [];

        // 上传附件处理
        const fileInput = document.getElementById('fileInput');
        fileInput.addEventListener('change', function(e) {
            const files = e.target.files;
            if (!files.length) return;

            attachments = [];
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                
                reader.onload = function(event) {
                    // 判断文件类型
                    let type = 'file';
                    if (file.type.startsWith('image/')) {
                        type = 'image';
                    } else if (file.type.startsWith('video/')) {
                        type = 'video';
                    }

                    attachments.push({
                        name: file.name,
                        type: type,
                        data: event.target.result
                    });

                    // 提示上传成功
                    alert(`已上传：${file.name}`);
                };

                reader.readAsDataURL(file);
            }
        });

        // 获取本地存储的说说
        function getSays() {
            const says = localStorage.getItem('loveSays');
            return says ? JSON.parse(says) : [];
        }

        // 渲染说说列表
        function renderSays(filter = '') {
            const says = getSays();
            document.getElementById('recordCount').textContent = says.length;

            let filteredSays = says;
            if (filter) {
                filteredSays = says.filter(say => say.content.includes(filter) || say.time.includes(filter));
            }

            const sayList = document.getElementById('sayList');
            if (filteredSays.length === 0) {
                sayList.innerHTML = '<div style="text-align: center; color: #999; padding: 40px 0;">还没有说说内容~</div>';
                return;
            }

            sayList.innerHTML = filteredSays.reverse().map(say => {
                // 渲染附件
                let attachmentHtml = '';
                if (say.attachments && say.attachments.length > 0) {
                    attachmentHtml = `
                        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;">
                            ${say.attachments.map(att => {
                                if (att.type === 'image') {
                                    return `<img src="${att.data}" alt="${att.name}" style="width: 120px; height: 120px; border-radius: 4px; object-fit: cover; cursor: pointer;" onclick="window.open('${att.data}')">`;
                                } else if (att.type === 'video') {
                                    return `<video src="${att.data}" controls style="width: 120px; height: 120px; border-radius: 4px; object-fit: cover;"></video>`;
                                } else {
                                    return `<div style="width: 120px; height: 120px; border-radius: 4px; background: #f5f5f5; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #666; padding: 5px; word-break: break-all;"><a href="${att.data}" target="_blank">查看附件</a></div>`;
                                }
                            }).join('')}
                        </div>
                    `;
                }

                return `
                    <div class="say-item" data-id="${say.time}">
                        <div class="say-header" style="display:flex; justify-content:space-between;">
                            <div class="say-content">${say.content}</div>
                            <button class="delete-btn" style="display:none; color:red; border:none; background:none; cursor:pointer;" onclick="deleteSay('${say.time}')">🗑️</button>
                        </div>
                        ${attachmentHtml}
                        <div class="say-meta">${say.time}</div>
                    </div>
                `;
            }).join('');

            // 如果是管理员，显示删除按钮
            if (localStorage.getItem('role') === 'admin') {
                document.querySelectorAll('.delete-btn').forEach(btn => btn.style.display = 'block');
            }
        }

        // 发布说说
        const publishBtn = document.getElementById('publishBtn');
        publishBtn.addEventListener('click', async () => {
            const content = document.getElementById('sayContent').value.trim();
            const fileInput = document.getElementById('fileInput');
            
            // 修复点1：纯文字说说逻辑判断修正
            // 如果既没有文字，也没有选择文件，才报错
            if (!content && (!fileInput.files || fileInput.files.length === 0)) {
                alert('写点什么或者发张图片吧～');
                return;
            }

            publishBtn.disabled = true;
            publishBtn.textContent = '发布中...';

            // 修复点2：声明 attachments 数组 (之前缺少 let/const，可能导致引用全局变量)
            const newAttachments = [];

            if (fileInput.files && fileInput.files.length > 0) {
                for (let i = 0; i < fileInput.files.length; i++) {
                    const file = fileInput.files[i];
                    try {
                        const url = await API.uploadFile(file, 'attachments/');
                        
                        let type = 'file';
                        if (file.type.startsWith('image/')) type = 'image';
                        else if (file.type.startsWith('video/')) type = 'video';
                        
                        newAttachments.push({
                            name: file.name,
                            type: type,
                            data: url
                        });
                    } catch (err) {
                        console.error('上传失败', err);
                    }
                }
            }

            const now = new Date();
            const timeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;

            const newSay = {
                content: content,
                time: timeStr,
                attachments: newAttachments
            };

            // 获取最新数据并更新
            const says = await getSays();
            says.push(newSay);
            await API.saveData('says.json', says);

            // 重置
            document.getElementById('sayContent').value = '';
            fileInput.value = '';
            publishBtn.disabled = false;
            publishBtn.textContent = '发布';
            document.getElementById('publishCard').style.display = 'none'; // 收起
            
            // 清空全局附件缓存（如果有的话）
            if(typeof attachments !== 'undefined') attachments = [];

            renderSays();
        });

        // 删除说说函数
        window.deleteSay = async function(time) {
            if (!confirm('确定要删除这条说说吗？')) return;
            const says = await getSays();
            const newSays = says.filter(s => s.time !== time);
            await API.saveData('says.json', newSays);
            renderSays();
        };

        // 说说搜索功能
        const searchSay = document.getElementById('searchSay');
        searchSay.addEventListener('input', function() {
            renderSays(this.value.trim());
        });

        // 更新恋爱天数
        function updateLoveDays() {
            const now = new Date();
            const diff = now - LOVE_START_DATE;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('loveDays').textContent = days;
        }

        // 更新相册数量
        function updateAlbumCount() {
            const albums = localStorage.getItem('loveAlbums');
            const count = albums ? JSON.parse(albums).length : 0;
            document.getElementById('albumCount').textContent = count;
        }

        // 导航跳转逻辑
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', function () {
                const page = this.dataset.page;
                if (page === 'record') {
                    window.location.href = 'record.html';
                } else if (page === 'album') {
                    window.location.href = 'album.html';
                } else if (page === 'home') {
                    window.location.href = 'index.html';
                }
            });
        });

        // 发布框切换逻辑
        const publishToggleBtn = document.getElementById('publishToggleBtn');
        const publishCard = document.getElementById('publishCard');
        
        publishToggleBtn.addEventListener('click', () => {
            const role = localStorage.getItem('role');
            if (role !== 'admin') {
                alert('只有管理员可以发布说说哦~ 请先在主页登录');
                return;
            }
            if (publishCard.style.display === 'none') {
                publishCard.style.display = 'block';
            } else {
                publishCard.style.display = 'none';
            }
        });

        // 初始化
        window.onload = function () {
            // 检查是否登录（兼容 session 和 local）
            if (!localStorage.getItem('isLoggedIn') && !sessionStorage.getItem('isLoggedIn')) {
                window.location.replace('login.html');
                return;
            }

            renderSays();
            updateLoveDays();
            updateAlbumCount();
            
            // 如果是管理员，且在PC端(视口较宽)，可以默认显示发布框? 
            // 还是严格遵循"先显示说说内容"，保持折叠，需要点一下才出来。
            // 既然PC端也有菜单按钮(现在变成了+号)，也可以点击展开。
            // 但为了体验，如果PC端空间大，或许可以检查一下
            // 暂且保持一致，默认折叠，需要点击。
        };
    </script>
</body>

</html>
